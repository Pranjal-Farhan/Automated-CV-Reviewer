version: "3.8"

# ─────────────────────────────────────────────────────────
# Shared volume: both services can read/write to "output"
# ─────────────────────────────────────────────────────────

services:
  # ─── PARSER SERVICE (Teammate's) ──────────────────────
  parser:
    build:
      context: ./parser
      dockerfile: Dockerfile
    volumes:
      - ./input:/app/input:ro
      - ./output:/app/output

  # ─── ANALYZER SERVICE (Yours) ─────────────────────────
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    volumes:
      - ./output:/app/output:ro     # Reads parser's output
    env_file:
      - ./analyzer/.env             # Your Gemini API key
    depends_on:
      - parser                      # Ensures parser runs first
    stdin_open: true
    tty: true