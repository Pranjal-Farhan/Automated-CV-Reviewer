version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv-reviewer-app
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - MONGO_DB_NAME=cv_reviewer
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-secret-key-in-production}
      - JWT_EXPIRE_MINUTES=1440
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost,http://frontend
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./cv-reviewer-frontend
      dockerfile: Dockerfile
    container_name: cv-reviewer-frontend
    ports:
      - "3000:80"
    depends_on:
      - app
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: cv-reviewer-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
